services:
  postgres:
    image: postgres:16-alpine
    container_name: mrtrader_postgres
    environment:
      POSTGRES_USER: mrtrader
      POSTGRES_PASSWORD: mrtrader_password
      POSTGRES_DB: mrtrader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrtrader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mrtrader_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mrtrader_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mrtrader:mrtrader_password@postgres:5432/mrtrader
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount reports so they persist on host
      - ./reports:/app/reports
      # Mount frontend dist so it can be rebuilt without rebuilding the image
      - ./frontend/dist:/app/frontend/dist
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
