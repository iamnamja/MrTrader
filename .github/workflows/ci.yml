name: MrTrader CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  # Stub values so pydantic-settings doesn't fail at import time
  ALPACA_API_KEY: "test_key"
  ALPACA_SECRET_KEY: "test_secret"
  DATABASE_URL: "sqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379"

jobs:
  # ── Lint + type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 mypy types-redis

      - name: Install app dependencies
        run: pip install -r requirements.txt

      - name: flake8
        run: |
          flake8 app/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501 \
            --exclude=app/database/migrations/

      - name: mypy (advisory)
        run: |
          mypy app/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude app/database/migrations/ \
            || true

  # ── Unit + contract tests ────────────────────────────────────────────────────
  test:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit + integration + contract tests
        env:
          ALPACA_API_KEY: ${{ env.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ env.ALPACA_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/ \
            --ignore=tests/test_strategy_regression.py \
            -v --tb=short -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-omit="app/backtest/*,app/integrations/*" \
            --cov-fail-under=58

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Strategy regression (main only, needs yfinance network access) ───────────
  backtest-regression:
    name: Backtest Regression
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strategy regression (unit tests only, skip network)
        env:
          ALPACA_API_KEY: ${{ env.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ env.ALPACA_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
        run: |
          pytest tests/test_strategy_regression.py \
            -v --tb=short \
            -k "signal or sizer or check_exit or position"
        timeout-minutes: 10

  # ── CI gate ──────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Pass Gate
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All required jobs must pass
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" ]]; then
            echo "CI failed: lint=${{ needs.lint.result }} test=${{ needs.test.result }}"
            exit 1
          fi
          echo "CI passed."
