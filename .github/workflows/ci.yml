name: CI Pipeline

on:
  push:
    branches: [ develop, main, 'feature/**' ]
  pull_request:
    branches: [ develop, main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mrtrader
          POSTGRES_PASSWORD: mrtrader_password
          POSTGRES_DB: mrtrader
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov flake8 black isort

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 app tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Check code formatting with black
      run: black --check app tests
      continue-on-error: true

    - name: Check import sorting with isort
      run: isort --check-only app tests
      continue-on-error: true

    - name: Run tests
      env:
        DATABASE_URL: postgresql://mrtrader:mrtrader_password@localhost:5432/mrtrader
        REDIS_URL: redis://localhost:6379
        ALPACA_API_KEY: test_key
        ALPACA_SECRET_KEY: test_secret
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Build status
      if: always()
      run: echo "CI Pipeline completed"

  check-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check for secrets
      run: |
        # Simple check: look for common secret patterns
        if grep -r "ALPACA_API_KEY\|ALPACA_SECRET_KEY" --include="*.py" app/ | grep -v ".example\|config.py\|#"; then
          echo "WARNING: Potential secrets in code"
          exit 1
        fi
      continue-on-error: true

    - name: Check .env is not committed
      run: |
        if git log --all --full-history -- ".env" | grep -q ".env"; then
          echo "ERROR: .env file found in git history!"
          exit 1
        fi
      continue-on-error: true
