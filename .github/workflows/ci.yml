name: MrTrader CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  # Stub values so pydantic-settings doesn't fail at import time
  ALPACA_API_KEY: "test_key"
  ALPACA_SECRET_KEY: "test_secret"
  DATABASE_URL: "sqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379"

jobs:
  # ── Lint + type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 mypy types-redis -r requirements.txt

      - name: flake8
        run: |
          flake8 app/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501 \
            --exclude=app/database/migrations/

      - name: Guard stale app.database.db imports
        run: |
          # app/database/db.py is the shim — no other file should import from it.
          # Any new "from app.database.db" reference in app/ or tests/ means someone
          # added a stale import instead of using app.database.session directly.
          STALE=$(grep -rn "from app\.database\.db" app/ tests/ \
            --include="*.py" \
            | grep -v "app/database/db.py" \
            || true)
          if [ -n "$STALE" ]; then
            echo "ERROR: Stale 'from app.database.db' import found. Use app.database.session instead."
            echo "$STALE"
            exit 1
          fi
          echo "No stale app.database.db imports found."

      - name: mypy (advisory)
        run: |
          mypy app/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude app/database/migrations/ \
            || true

  # ── Unit + contract tests ────────────────────────────────────────────────────
  test:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv ~/.venv
          ~/.venv/bin/pip install -r requirements.txt

      - name: Run unit + integration + contract tests
        env:
          ALPACA_API_KEY: ${{ env.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ env.ALPACA_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: redis://localhost:6379
          PATH: ~/.venv/bin:$PATH
        run: |
          pytest tests/ \
            --ignore=tests/test_strategy_regression.py \
            --tb=short -q \
            --durations=20 \
            --override-ini="addopts=-n auto --dist=loadscope --timeout=120" \
            --cov=app \
            --cov-report=xml \
            --cov-fail-under=56 \
            --cov-config=pytest.ini

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Strategy regression (main only, needs yfinance network access) ───────────
  backtest-regression:
    name: Backtest Regression
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strategy regression (unit tests only, skip network)
        env:
          ALPACA_API_KEY: ${{ env.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ env.ALPACA_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
        run: |
          pytest tests/test_strategy_regression.py \
            -v --tb=short \
            -k "signal or sizer or check_exit or position"
        timeout-minutes: 10

  # ── CI gate ──────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Pass Gate
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All required jobs must pass
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" ]]; then
            echo "CI failed: lint=${{ needs.lint.result }} test=${{ needs.test.result }}"
            exit 1
          fi
          echo "CI passed."
